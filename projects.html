<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Vijay Koteswar</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        .page-hero { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem 1rem; opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
        .page-hero.visible { opacity: 1; transform: translateY(0); }
        .page-hero h2 { color: #fff; font-size: 2rem; border-left: 4px solid #667eea; padding-left: 1rem; margin-bottom: 0.5rem; }
        .page-hero p { color: #aaa; font-size: 1rem; padding-left: 1.25rem; }

        .filter-bar { max-width: 1200px; margin: 1.5rem auto 0; padding: 0 2rem; display: flex; gap: 0.75rem; flex-wrap: wrap; opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease 0.1s, transform 0.6s ease 0.1s; }
        .filter-bar.visible { opacity: 1; transform: translateY(0); }
        .filter-btn { background: transparent; border: 1px solid #333; color: #aaa; padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.3s; font-family: inherit; }
        .filter-btn:hover, .filter-btn.active { background: #667eea; border-color: #667eea; color: #fff; }

        .projects-list { max-width: 1200px; margin: 2rem auto; padding: 0 2rem 4rem; display: flex; flex-direction: column; gap: 1.25rem; }

        /* ── Split card ── */
        .split-card { display: grid; grid-template-columns: 280px 1fr; border-radius: 12px; overflow: hidden; border: 1px solid #222; opacity: 0; transform: translateY(24px); transition: opacity 0.5s ease, transform 0.5s ease, box-shadow 0.3s; }
        .split-card.visible { opacity: 1; transform: translateY(0); }
        .split-card:hover { box-shadow: 0 6px 32px rgba(102,126,234,0.14); }
        .split-card.personal:hover { box-shadow: 0 6px 32px rgba(118,75,162,0.18); }

        /* Left panel */
        .split-left { background: linear-gradient(160deg, #13133a 0%, #0e0e2a 100%); padding: 1.5rem; display: flex; flex-direction: column; gap: 0.6rem; border-right: 1px solid #222; position: relative; overflow: hidden; }
        .split-left::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #667eea, #764ba2); }
        .split-card.personal .split-left::before { background: linear-gradient(90deg, #764ba2, #a78bfa); }

        .sl-type { font-size: 0.72rem; color: #aaa; background: rgba(255,255,255,0.06); padding: 0.2rem 0.6rem; border-radius: 20px; align-self: flex-start; }
        .sl-title { color: #fff; font-size: 1rem; font-weight: 700; line-height: 1.35; }
        .sl-org { color: #667eea; font-size: 0.82rem; font-weight: 600; }
        .split-card.personal .sl-org { color: #a78bfa; }
        .sl-year { font-size: 0.78rem; color: #667eea; font-weight: 600; background: rgba(102,126,234,0.12); padding: 0.2rem 0.6rem; border-radius: 20px; align-self: flex-start; margin-top: auto; }
        .split-card.personal .sl-year { color: #a78bfa; background: rgba(167,139,250,0.12); }

        .sl-technologies { display: flex; flex-wrap: wrap; gap: 0.3rem; padding-top: 0.6rem; border-top: 1px solid rgba(255,255,255,0.06); }
        .tech-badge { font-size: 0.7rem; padding: 0.18rem 0.5rem; border-radius: 4px; font-weight: 600; }
        .tech-badge.lang  { background: rgba(250,176,5,0.12);  color: #f0a500; }
        .tech-badge.cloud { background: rgba(255,100,50,0.12);  color: #ff7043; }
        .tech-badge.data  { background: rgba(0,188,212,0.12);   color: #26c6da; }
        .tech-badge.tool  { background: rgba(102,126,234,0.12); color: #667eea; }

        /* Right panel */
        .split-right { background: #111; padding: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
        .sr-desc { color: #bbb; font-size: 0.9rem; margin: 0; line-height: 1.6; }

        .impact-list { list-style: none; display: flex; flex-direction: column; gap: 0.35rem; }
        .impact-list li { font-size: 0.83rem; color: #ccc; padding-left: 1.2rem; position: relative; }
        .impact-list li::before { content: '▸'; position: absolute; left: 0; color: #667eea; }

        .card-link { color: #667eea; text-decoration: none; font-weight: 600; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 0.3rem; margin-top: auto; transition: gap 0.2s; }
        .card-link:hover { text-decoration: underline; gap: 0.5rem; }

        @media (max-width: 768px) {
            .projects-list { padding: 0 1rem 3rem; }
            .split-card { grid-template-columns: 1fr; }
            .split-left { border-right: none; border-bottom: 1px solid #222; }
            .sl-year { margin-top: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content"></div>
        </header>

        <div class="page-hero" id="hero">
            <h2>Projects</h2>
            <p>Enterprise initiatives, AI integrations, and personal products — 20+ years of delivering impactful solutions.</p>
        </div>

        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="ai">AI &amp; Automation</button>
            <button class="filter-btn" data-filter="cloud">Cloud Migration</button>
            <button class="filter-btn" data-filter="data">Data &amp; Analytics</button>
            <button class="filter-btn" data-filter="pm">Project Management</button>
            <button class="filter-btn" data-filter="delivery">Enterprise Delivery</button>
            <button class="filter-btn" data-filter="personal">Personal Projects</button>
        </div>

        <div class="projects-list" id="projectsList"></div>

        <footer>
            <p>&copy; 2026 Vijay Koteswar &mdash; <a href="index.html">Back to Portfolio</a></p>
        </footer>
    </div>

    <script src="shared.js"></script>
    <script src="projects.data.js"></script>
    <script>
        const TECH_TYPE = {
            'Python':'lang','Java':'lang','C++':'lang','C':'lang','Node.js':'lang',
            'React JS':'lang','React':'lang','Angular':'lang','.Net':'lang','VB':'lang',
            'J2EE':'lang','VC++':'lang','Visual Basic':'lang','TypeScript':'lang',
            'Shell Scripting':'lang','UNIX Scripting':'lang','Shell':'lang',
            'Code Parsers':'lang','Selenium':'lang',
            'AWS':'cloud','Azure':'cloud','AWS Lambda':'cloud','Databricks':'cloud',
            'Azure Synapse':'cloud','Azure Data Factory':'cloud','ADF':'cloud',
            'Microsoft Fabric':'cloud','Terraform':'cloud','CI/CD':'cloud',
            'CloudWatch':'cloud','REST APIs':'cloud','GDB':'cloud','Make':'cloud',
            'Power BI':'data','AppDynamics':'data','Splunk':'data','IBM DataStage':'data',
            'DataStage':'data','Ab Initio':'data','Oracle DB':'data','PostgreSQL':'data',
            'MS-Access':'data','SQL':'data','Database Tools':'data','Database':'data',
            'JDBC':'data','Kibana':'data',
        };
        const techType = t => TECH_TYPE[t] || 'tool';

        const list = document.getElementById('projectsList');
        list.innerHTML = PROJECTS.map(p => `
            <div class="split-card${p.personal ? ' personal' : ''}" data-category="${p.category}">
                <div class="split-left">
                    <span class="sl-type">${p.type}</span>
                    <span class="sl-title">${p.title}</span>
                    <span class="sl-org">${p.org}</span>
                    ${p.technologies ? `<div class="sl-technologies">${p.technologies.map(t => `<span class="tech-badge ${techType(t)}">${t}</span>`).join('')}</div>` : ''}
                    <span class="sl-year">${p.year}</span>
                </div>
                <div class="split-right">
                    <p class="sr-desc">${p.description}</p>
                    <ul class="impact-list">
                        ${p.impact.map(i => `<li>${i}</li>`).join('')}
                    </ul>
                    ${p.link ? `<a class="card-link" href="${p.link.href}" target="_blank">${p.link.label} →</a>` : ''}
                </div>
            </div>`).join('');

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => document.getElementById('hero').classList.add('visible'), 50);
            setTimeout(() => document.getElementById('filterBar').classList.add('visible'), 150);
        });

        revealOnScroll('.split-card', { threshold: 0.06, stagger: 60 });

        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.dataset.filter;
                document.querySelectorAll('.split-card').forEach(card => {
                    card.style.display = (filter === 'all' || card.dataset.category === filter) ? '' : 'none';
                });
            });
        });
    </script>
</body>
</html>
